# Shared security-header snippet for Digilist nginx server blocks.
#
# The main digilist.no block already sets these; the audit flags
# status.digilist.no, dev.digilist.no and dashboard.dev.digilist.no for
# missing HSTS / X-Frame-Options / X-Content-Type-Options / Referrer-Policy /
# Permissions-Policy. `include` this file inside each of those `server {}`
# blocks (see infra/apply-security-headers.sh) to close those findings.
#
# NOTE: Content-Security-Policy is deliberately NOT included here — a wrong
# CSP breaks a running app, and these surfaces load different resources than
# the marketing site. Add a per-app CSP separately once its resource origins
# are known. Everything below is safe to apply blanket.

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "0" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self), interest-cohort=()" always;
