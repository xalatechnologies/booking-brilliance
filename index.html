<!doctype html>
<html lang="nb-NO">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      One-time recovery: digilist.no previously hosted the app (now at
      app.digilist.no). Browsers that visited the old app may still have a
      stale service worker + caches that intercept fetches and serve the
      old SPA. This snippet unregisters any registered SW and clears all
      CacheStorage on page load. The marketing site does not use service
      workers, so this is safe to run unconditionally.
    -->
    <script>
      (function () {
        try {
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker
              .getRegistrations()
              .then(function (regs) {
                regs.forEach(function (r) { r.unregister(); });
              })
              .catch(function () { /* ignore */ });
          }
          if ("caches" in window) {
            caches
              .keys()
              .then(function (keys) {
                keys.forEach(function (k) { caches.delete(k); });
              })
              .catch(function () { /* ignore */ });
          }
        } catch (_) { /* ignore */ }
      })();
    </script>

    <!-- Favicons -->
    <!-- 5.5KB favicon instead of the 145KB logo.svg / 228KB icon.png the
         browser used to fetch on every page (competed for the LCP window on
         slow 4G). apple-touch-icon stays full-size — only fetched on iOS
         add-to-home-screen, never on a normal page load. -->
    <link rel="icon" href="/favicon-48.png" type="image/png" sizes="48x48" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- LCP hero — preload the responsive festsal-1 webp with fetchpriority
         so the browser starts the download in parallel with the JS bundle.
         The image is now sized to its slot (512w mobile ≈ 32KB, 1024w desktop
         ≈ 91KB) instead of the old 236KB full-res webp — mobile LCP was
         download-bound on slow 4G. imagesizes must match the <picture> sizes. -->
    <link
      rel="preload"
      as="image"
      type="image/webp"
      imagesrcset="/hero/festsal-1-512.webp 512w, /hero/festsal-1-1024.webp 1024w"
      imagesizes="(max-width: 768px) 66vw, 500px"
      fetchpriority="high"
    />

    <!-- Editorial Nordic typography: Fraunces (variable serif display) +
         Public Sans (body) + JetBrains Mono (specs).
         Non-blocking load via media="print" trick so the hero image isn't
         held back by font CSS. `display=optional` ensures text renders
         immediately in the fallback stack while the variable font streams. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=Public+Sans:ital,wght@0,100..900;1,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=optional"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=Public+Sans:ital,wght@0,100..900;1,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=optional"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=Public+Sans:ital,wght@0,100..900;1,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=optional" />
    </noscript>
    
    <!-- Primary Meta Tags -->
    <title>Digilist — Én plattform for alt som leies ut</title>

    <meta name="description" content="Digital bookingplattform for selskapslokaler, idrettshaller, møterom og kulturhus. Sanntidskalender, Vipps, BankID, EHF, sesongleie. ISO 27001-sertifisert." />
    <meta name="keywords" content="booking, utleie, selskapslokale, kulturhus, idrettshall, møterom, kommune, kontorbygg, foreninger, Vipps, BankID, ID-porten, EHF, Peppol, ISO 27001, GDPR, universell utforming, bookingsystem, lokalbooking, ressurstyring, Norge" />
    <meta name="author" content="Xala Technologies AS" />

    <meta name="googlebot" content="index, follow" />

  </head>
