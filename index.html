<!doctype html>
<html lang="nb-NO">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      One-time recovery: digilist.no previously hosted the app (now at
      app.digilist.no). Browsers that visited the old app may still have a
      stale service worker + caches that intercept fetches and serve the
      old SPA. This snippet unregisters any registered SW and clears all
      CacheStorage on page load. The marketing site does not use service
      workers, so this is safe to run unconditionally.
    -->
    <script>
      (function () {
        try {
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker
              .getRegistrations()
              .then(function (regs) {
                regs.forEach(function (r) { r.unregister(); });
              })
              .catch(function () { /* ignore */ });
          }
          if ("caches" in window) {
            caches
              .keys()
              .then(function (keys) {
                keys.forEach(function (k) { caches.delete(k); });
              })
              .catch(function () { /* ignore */ });
          }
        } catch (_) { /* ignore */ }
      })();
    </script>

    <!--
      Assistant-rail width: publish --rail-w before hydration so the
      prerendered content reserves the correct right gutter from first paint
      (no reflow when the lazy AssistantRail mounts, and no wrong-width gutter
      for users who collapsed it). Mirrors ChatbotProvider's persistence
      (key "digilist-rail-expanded-v1", "0" = collapsed, default expanded).
      Desktop-only in effect — the `lg:pr-[var(--rail-w)]` utility gates it,
      so mobile ignores the value.
    -->
    <script>
      (function () {
        try {
          var expanded = localStorage.getItem("digilist-rail-expanded-v1") !== "0";
          document.documentElement.style.setProperty("--rail-w", expanded ? "22rem" : "0px");
        } catch (_) {
          document.documentElement.style.setProperty("--rail-w", "22rem");
        }
      })();
    </script>

    <!-- Favicons -->
    <!-- 5.5KB favicon instead of the 145KB logo.svg / 228KB icon.png the
         browser used to fetch on every page (competed for the LCP window on
         slow 4G). apple-touch-icon stays full-size — only fetched on iOS
         add-to-home-screen, never on a normal page load. -->
    <link rel="icon" href="/favicon-48.png" type="image/png" sizes="48x48" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- No hero preload: the LCP element is the H1 headline text (measured
         203k px² vs the hero image's 109k px²), not the festsal image. On
         slow 4G a high-priority hero preload just stole bandwidth from the
         text-render critical path (HTML + inlined critical CSS + font). The
         hero loads at normal priority during parse instead. -->

    <!-- Editorial Nordic typography: Newsreader (variable serif display) +
         Inter (variable body) + IBM Plex Mono (specs). Self-hosted from
         /public/fonts via @font-face in src/fonts.css — no third-party font
         CDN request, so no connection to any external font host and no
         visitor-IP leak (GDPR). font-display: optional keeps the text-first
         LCP behavior: the H1 renders immediately in the fallback stack and the
         variable font applies only if it streams in time (no layout shift). -->

    <meta name="author" content="Xala Technologies AS" />

    <meta name="googlebot" content="index, follow" />

    <meta name="ICBM" content="59.9139, 10.7522" />

    <!-- Plausible Analytics — privacy-first, no cookies, GDPR-compliant -->

    <script>window.plausible = window.plausible || function() { (window.plausible.q = window.plausible.q || []).push(arguments) }</script>

    <!-- Structured Data (JSON-LD) will be injected by SEO component -->
  </head>
