name: Daily blog agent

# Generates N blogs/day on searched-keyword gaps, auto-publishes them, and
# ships them to digilist.no/blogg — fully hands-free.
#   discover+analyze+generate → auto-publish → sync (fence-strip + cover) →
#   date to today → commit → deploy
on:
  # Daily generation now runs on the VPS on the Claude Max subscription
  # (systemd digilist-blog.timer, 05:30 UTC) — no per-token API cost. The cron
  # here is disabled to avoid double-generation; kept as a manual fallback that
  # still uses the ANTHROPIC_API_KEY secret if the VPS runner is ever down.
  # schedule:
  #   - cron: "0 5 * * *" # 05:00 UTC daily (moved to VPS+Max)
  workflow_dispatch:
    inputs:
      count:
        description: "How many blogs to generate"
        default: "3"

concurrency:
  group: daily-blogs
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # The commit step pushes the day's new posts back to the repo. The default
    # Actions token is read-only unless we grant write here — without this the
    # `git push` failed with exit 128.
    permissions:
      contents: write
      # The idea agent files GitHub issues when Linear isn't configured.
      issues: write
    steps:
      - uses: actions/checkout@v4
      # No version here — pnpm is pinned by "packageManager" in package.json
      # (pnpm@10.33.4). Setting both errors "Multiple versions of pnpm specified".
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # 1. discover (searched keywords) → analyze (gap-rank) → generate N drafts
      - name: Generate blogs on top searched-keyword gaps
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          ADMIN_BASIC_AUTH: ${{ secrets.ADMIN_BASIC_AUTH }}
          CONTENT_AGENT_DRAFTS_PER_RUN: ${{ github.event.inputs.count || '3' }}
        run: |
          # Without a real key the agent silently generates 0 drafts (the LLM
          # calls 401) and the day looks like a no-op. Fail loudly instead.
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is empty — the blog agent can't generate. Set a valid key in repo secrets."
            exit 1
          fi
          pnpm content:all -- --trigger cron

      # 2. auto-approve + publish the new blog drafts (Convex source of truth)
      - name: Auto-publish
        env:
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          ADMIN_BASIC_AUTH: ${{ secrets.ADMIN_BASIC_AUTH }}
        run: pnpm content:autopublish

      # 3. pull published markdown into the repo (strips code fences, guarantees
      #    a real cover image)
      - name: Sync to repo
        env:
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          ADMIN_BASIC_AUTH: ${{ secrets.ADMIN_BASIC_AUTH }}
        run: pnpm content:sync

      # 4. date the new posts to today so they surface at the top of /blogg, commit
      - name: Date + commit new posts
        id: commit
        run: |
          today=$(date -u +%F)
          # Re-date any posts content:sync touched to today so they surface at the
          # top of /blogg. (Empty list → the loop is a no-op.)
          changed=$(git status --porcelain src/content/blog | awk '{print $2}')
          for f in $changed; do sed -i "s/^date:.*/date: $today/" "$f"; done
          # Stage new/changed posts AND the learning memory (the deep-review
          # records lessons into it — they must persist across runs).
          git add src/content/blog tools/content-agent/memory
          # If nothing is genuinely staged, there's no new content to ship. This
          # happens on a no-new-post day: sync re-emits existing posts with their
          # original Convex date, git flags a diff, then the re-date above cancels
          # it back to what's already committed. Treat that as a clean no-op rather
          # than letting `git commit` fail with "nothing to commit" (exit 1).
          if git diff --cached --quiet; then
            echo "none=1" >> "$GITHUB_OUTPUT"
            echo "No new blog content today — nothing to deploy."
            exit 0
          fi
          # Slugs of the posts that genuinely changed, for the live-verify gate.
          # The live URL is the frontmatter `slug:` (src/lib/posts.ts falls back
          # to the filename only when it's absent), which can differ from the
          # filename — so read the frontmatter, not the path, or verify-live
          # would probe a 404.
          staged=$(git diff --cached --name-only -- src/content/blog | grep '\.md$' || true)
          slugs=""
          for f in $staged; do
            s=$(sed -n 's/^slug:[[:space:]]*//p' "$f" | head -1 | tr -d '\042\047[:space:]')
            [ -z "$s" ] && s=$(basename "$f" .md)
            slugs="$slugs $s"
          done
          n=$(printf '%s\n' $staged | grep -c '\.md$' || true)
          echo "slugs=$slugs" >> "$GITHUB_OUTPUT"
          # Only a memory-only change (a draft was generated + reviewed but gated,
          # so no new post): commit the learnings but skip deploy/verify.
          if [ -z "$slugs" ]; then
            echo "none=1" >> "$GITHUB_OUTPUT"
            echo "Only learning-memory changed — committing lessons, nothing to deploy."
          fi
          git config user.name "digilist-blog-agent"
          git config user.email "bot@digilist.no"
          git commit -m "Daily blog agent: ${n} new post(s) + learnings [$today]"
          # Resilient push: main may have advanced between checkout and now
          # (a concurrent push/run). Rebase our single commit on top and retry
          # instead of hard-failing on a lost race.
          pushed=0
          for attempt in 1 2 3; do
            if git push; then pushed=1; break; fi
            echo "push rejected (attempt $attempt) — rebasing on origin/main and retrying"
            git pull --rebase origin main || break
          done
          if [ "$pushed" != "1" ]; then echo "::error::git push failed after retries"; exit 1; fi

      # 5. build + deploy to Hostinger (self-contained; doesn't rely on the
      #    separate deploy workflow triggering off the bot push)
      - name: Deploy
        if: steps.commit.outputs.none != '1'
        env:
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          ADMIN_BASIC_AUTH: ${{ secrets.ADMIN_BASIC_AUTH }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          # The secret holds the deploy key base64-encoded on a single line so
          # GitHub's multi-line-secret handling can never mangle the PEM newlines
          # (the previous raw `printf` form produced a corrupt key → the VPS
          # rejected it with "Permission denied (publickey)").
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" | base64 -d > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # Fail loudly if the decoded key isn't a valid, loadable private key,
          # instead of letting ssh fall through to no-key and a confusing 255.
          ssh-keygen -y -f ~/.ssh/id_deploy > /dev/null
          ssh-keyscan -H 72.61.23.56 >> ~/.ssh/known_hosts 2>/dev/null
          # Point every ssh/rsync in deploy.sh at this exact key (IdentitiesOnly
          # so it can't wander to other identities), no agent needed.
          cat >> ~/.ssh/config <<'EOF'
          Host 72.61.23.56
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config
          ./deploy.sh

      # 6. verify the new posts actually render LIVE end-to-end: URL 200s, the
      #    prerendered article carries real prose, and the cover image loads.
      #    This is the hands-free "verify everything live with images, text"
      #    gate — a green run means the day's posts are provably live, not just
      #    committed.
      - name: Verify live
        if: steps.commit.outputs.none != '1'
        run: ./scripts/verify-live-posts.sh https://digilist.no ${{ steps.commit.outputs.slugs }}

      # 7. propose product features from the same keyword research + content
      #    gaps, filed into Linear (or GitHub issues), deduped so it converges.
      #    Weekly cadence (Mondays) or any manual dispatch, so it doesn't spam
      #    the backlog daily. Runs regardless of whether a post shipped today.
      - name: Propose feature ideas
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          ADMIN_BASIC_AUTH: ${{ secrets.ADMIN_BASIC_AUTH }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_KEY: ${{ vars.LINEAR_TEAM_KEY }}
          # 'both' files to Linear + GitHub; until LINEAR_API_KEY is set the
          # Linear path safely warns and skips, so it degrades to GitHub-only.
          CONTENT_IDEAS_TARGET: ${{ vars.CONTENT_IDEAS_TARGET || 'both' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "$(date -u +%u)" != "1" ]; then
            echo "Skipping idea generation (runs Mondays or on manual dispatch)."; exit 0
          fi
          # Non-fatal: the idea agent is supplementary — a tracker/API hiccup (or
          # a missing key) must not fail the blog pipeline.
          pnpm content:ideas || echo "::warning::feature-idea step failed (non-fatal, continuing)"
