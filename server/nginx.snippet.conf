# Add this inside the `server { server_name digilist.no; ... }` block
# in /etc/nginx/sites-enabled/digilist-apps.conf, then `nginx -s reload`.

# `^~` stops nginx from falling through to a regex location (like the two
# below) for anything under /api/, so a proxied path that happens to end in
# .svg/.png/etc. still hits the proxy instead of being served from disk.
location ^~ /api/ {
    proxy_pass         http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_connect_timeout 5s;
}

# Vite content-hashes every filename under /assets/ (changes whenever the
# content does), so it's safe to cache for a year with `immutable` — a
# redeploy ships new filenames, it never mutates an old one. Fonts under
# /fonts/ keep fixed filenames but are static, hand-generated woff2 payloads
# that only change on a deliberate re-subset (rare, and always alongside a
# deploy) — long caching is standard practice for self-hosted fonts.
# Lighthouse's "uses-long-cache-ttl" audit flagged ~2.8MB of these (JS, CSS,
# woff2) served with no cache header at all (XAL-319).
#
# nginx only inherits the server block's `add_header` directives when a
# location adds none of its own — since both locations below add
# Cache-Control, they'd otherwise silently drop every security header the
# digilist.no server block sets (DEPLOYMENT.md documents HSTS,
# X-Content-Type-Options, X-Frame-Options, X-XSS-Protection, Referrer-Policy,
# a CSP and a Permissions-Policy on this domain). Re-declare the headers with
# a stable, fully-specified value here. CSP and Permissions-Policy are NOT
# reproduced below: DEPLOYMENT.md only shows them truncated, and pasting a
# guessed policy string is worse than leaving this as a TODO — copy the
# live block's exact `Content-Security-Policy` and `Permissions-Policy`
# add_header lines into both locations below before applying this on the VPS.
location ~* ^/(assets|fonts)/ {
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # TODO: also re-declare Content-Security-Policy and Permissions-Policy
    # here, copied verbatim from the live digilist.no server block.
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}

# Root-level static files (favicons, og-image, logo, etc.) are NOT
# content-hashed, so a shorter cache with revalidation is safer — a same-name
# file can legitimately change between deploys.
location ~* \.(?:png|jpg|jpeg|webp|avif|svg|ico|webmanifest)$ {
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # TODO: also re-declare Content-Security-Policy and Permissions-Policy
    # here, copied verbatim from the live digilist.no server block.
    add_header Cache-Control "public, max-age=86400, must-revalidate" always;
}
